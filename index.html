<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>全域智能管家</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, sans-serif; min-height: 100vh; display: flex; justify-content: center; align-items: center; background: linear-gradient(135deg, #89f7fe 0%, #66a6ff 100%); transition: background 1s ease; color: white; padding: 15px;}
        
        .flip-container { perspective: 1000px; width: 100%; max-width: 420px; }
        .flipper { transition: 0.8s; transform-style: preserve-3d; position: relative; width: 100%; height: 780px; }
        .front, .back { backface-visibility: hidden; position: absolute; top: 0; left: 0; width: 100%; height: 100%; border-radius: 30px; background: rgba(255, 255, 255, 0.15); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.3); box-shadow: 0 15px 35px rgba(0,0,0,0.1); padding: 25px; display: flex; flex-direction: column; gap: 12px; }
        .back { transform: rotateY(180deg); background: linear-gradient(135deg, #2c3e50 0%, #3498db 100%); }
        .flip-container.flipped .flipper { transform: rotateY(180deg); }

        .header { display: flex; justify-content: space-between; align-items: center; font-weight: 600; font-size: 1.1rem; opacity: 0.9;}
        
        /* 城市选择下拉框样式 */
        .city-select { background: rgba(0,0,0,0.2); color: white; border: 1px solid rgba(255,255,255,0.4); padding: 5px 10px; border-radius: 10px; font-size: 1rem; outline: none; cursor: pointer; font-weight: bold;}
        .city-select option { background: #2c3e50; color: white; }

        .main-weather { text-align: center; margin: 5px 0; }
        .temp-display { font-size: 5.5rem; font-weight: 700; line-height: 1; text-shadow: 2px 4px 10px rgba(0,0,0,0.15); }
        .feels-like { font-size: 1.05rem; opacity: 0.9; margin-top: 5px; }
        .weather-desc { font-size: 1.1rem; margin-top: 10px; font-weight: 500; background: rgba(0,0,0,0.1); display: inline-block; padding: 5px 15px; border-radius: 20px;}
        
        .life-index { background: rgba(255,255,255,0.2); border-radius: 15px; padding: 12px; font-size: 0.9rem; line-height: 1.5;}
        .life-item { display: flex; margin-bottom: 6px; }
        .tag-yi { background: #4cd137; color: white; padding: 2px 8px; border-radius: 6px; font-weight: bold; margin-right: 8px; font-size: 0.8rem;}
        .tag-ji { background: #e84118; color: white; padding: 2px 8px; border-radius: 6px; font-weight: bold; margin-right: 8px; font-size: 0.8rem;}

        .grid-6 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
        .grid-box { background: rgba(0, 0, 0, 0.1); padding: 10px 5px; border-radius: 12px; text-align: center; font-size: 0.75rem; display: flex; flex-direction: column; justify-content: space-between; }
        .grid-box span.val { font-size: 1.05rem; font-weight: bold; margin-top: 5px; display: block;}
        .grid-box .icon { font-size: 1.1rem; margin-bottom: 2px;}

        .action-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: auto;}
        .action-btn { background: rgba(255, 255, 255, 0.2); border: 1px solid rgba(255, 255, 255, 0.4); padding: 12px 5px; border-radius: 15px; color: white; font-size: 0.85rem; font-weight: 600; cursor: pointer; transition: all 0.2s ease; text-align: center; display: flex; align-items: center; justify-content: center;}
        .action-btn:active { transform: scale(0.95); }
        .btn-gold { grid-column: span 2; background: linear-gradient(135deg, #f6d365 0%, #fda085 100%); border: none; font-size: 1rem; padding: 15px;}

        .modal { display: none; position: fixed; z-index: 10; left: 0; top: 0; width: 100%; height: 100%; background-color: rgba(0,0,0,0.4); justify-content: center; align-items: center; padding: 20px;}
        .modal-content { background: #fff; color: #333; padding: 25px; border-radius: 20px; width: 100%; max-width: 350px; text-align: left; animation: pop 0.3s ease;}
        @keyframes pop { from {transform: scale(0.8); opacity: 0;} to {transform: scale(1); opacity: 1;} }
        .close-btn { background: #3498db; color: white; border: none; padding: 10px 20px; border-radius: 10px; cursor: pointer; margin-top: 20px; width: 100%; font-weight: bold;}
    </style>
</head>
<body id="bg">
    <div class="flip-container" id="flip-box">
        <div class="flipper">
            <div class="front">
                <div class="header">
                    <select class="city-select" id="location-select" onchange="switchLocation()">
                        <option value="esp32">📍 我的室内硬件</option>
                        <option value="changsha">湖南 长沙 (室外真实)</option>
                        <option value="beijing">北京 (室外真实)</option>
                        <option value="shanghai">上海 (室外真实)</option>
                        <option value="guangzhou">广州 (室外真实)</option>
                    </select>
                    <div id="clock">00:00</div>
                </div>
                
                <div class="main-weather">
                    <div class="temp-display"><span id="temp">--</span>°</div>
                    <div class="feels-like">体感温度 <span id="feels-like">--</span>°C</div>
                    <div class="weather-desc" id="desc">正在连接数据源...</div>
                </div>

                <div class="life-index">
                    <div class="life-item"><div class="tag-yi">宜</div><div id="yi-text">加载中...</div></div>
                    <div class="life-item"><div class="tag-ji">忌</div><div id="ji-text">加载中...</div></div>
                </div>
                
                <div class="grid-6">
                    <div class="grid-box"><div class="icon">💧</div>湿度<span class="val" id="hum">--%</span></div>
                    <div class="grid-box"><div class="icon">☀️</div>紫外线<span class="val" id="uv">--</span></div>
                    <div class="grid-box"><div class="icon">🎐</div>风力<span class="val" id="wind">--级</span></div>
                    <div class="grid-box"><div class="icon">⏱️</div>气压<span class="val" id="pressure">--hPa</span></div>
                    <div class="grid-box"><div class="icon">📈</div>最高温<span class="val" id="max-t">--°</span></div>
                    <div class="grid-box"><div class="icon">📉</div>最低温<span class="val" id="min-t">--°</span></div>
                </div>

                <div class="action-grid">
                    <div class="action-btn" onclick="checkClothes()">👕 材质穿搭解析</div>
                    <div class="action-btn" onclick="checkHomestead()">🏠 建筑防潮评估</div>
                    <div class="action-btn btn-gold" onclick="flipToGold()">💰 一键切换市场黄金看板 🔄</div>
                </div>
            </div>

            <div class="back">
                <div class="header"><div>📈 宏观市场视图</div><div onclick="flipToWeather()" style="cursor: pointer;">🔙 返回环境</div></div>
                <div style="display: flex; flex-direction: column; align-items: center; justify-content: center; flex-grow: 1;">
                    <div style="color: #f6d365; font-weight: bold; margin-bottom: 10px;">国际黄金参考价 (前台演算)</div>
                    <div style="font-size: 5rem; font-weight: bold; color: #f6d365; text-shadow: 2px 4px 10px rgba(0,0,0,0.2);"><span id="gold-price">485.20</span></div>
                    <div style="font-size: 1.1rem; opacity: 0.9;">CNY / 克</div>
                    <div style="font-size: 0.9rem; background: rgba(0,0,0,0.2); padding: 8px 15px; border-radius: 15px; margin-top: 20px; color: #a8e6cf;" id="gold-trend">🟢 震荡微涨，保持关注</div>
                </div>
                <div class="action-btn" style="background: rgba(255,255,255,0.1); padding: 15px; font-size: 1rem;" onclick="flipToWeather()">🔙 翻转回物理空间</div>
            </div>
        </div>
    </div>

    <div id="myModal" class="modal">
        <div class="modal-content">
            <h3 id="modal-title" style="margin-bottom: 15px; font-size: 1.2rem;">提示</h3>
            <p id="modal-text" style="line-height: 1.6; font-size: 0.95rem; color: #555;"></p>
            <button class="close-btn" onclick="closeModal()">我知道了</button>
        </div>
    </div>

    <script>
        // ================= 请填入你的 ThingSpeak API 密钥 =================
        const CHANNEL_ID = '3288396'; 
        const READ_API_KEY = 'JUDMG2J8A59TGVI0';
        // ================================================================

        let currentT = 0, currentH = 0;
        let sessionMaxT = -100, sessionMinT = 100;
        let activeTimer = null; // 用于管理定时刷新任务

        // 各城市真实的经纬度坐标库 (用于 Open-Meteo 真实气象接口)
        const cityCoordinates = {
            "changsha": { lat: 28.23, lon: 112.93 },
            "beijing": { lat: 39.90, lon: 116.40 },
            "shanghai": { lat: 31.23, lon: 121.47 },
            "guangzhou": { lat: 23.13, lon: 113.28 }
        };

        function updateClock() {
            const now = new Date();
            document.getElementById('clock').innerText = now.getHours().toString().padStart(2, '0') + ":" + now.getMinutes().toString().padStart(2, '0');
        }
        setInterval(updateClock, 1000); updateClock();

        // 核心路由控制器：根据下拉菜单决定去哪拿数据
        function switchLocation() {
            let loc = document.getElementById('location-select').value;
            clearInterval(activeTimer); // 切换时先停止上一个定时器
            
            if (loc === "esp32") {
                fetchESP32Data();
                activeTimer = setInterval(fetchESP32Data, 15000);
            } else {
                fetchRealCityData(cityCoordinates[loc].lat, cityCoordinates[loc].lon);
                activeTimer = setInterval(() => fetchRealCityData(cityCoordinates[loc].lat, cityCoordinates[loc].lon), 600000); // 城市数据10分钟刷新一次即可
            }
        }

        // 数据源 1：拉取你房间内 ESP32 的私有真实数据
        function fetchESP32Data() {
            const url = `https://api.thingspeak.com/channels/${CHANNEL_ID}/feeds.json?api_key=${READ_API_KEY}&results=1`;
            fetch(url).then(res => res.json()).then(data => {
                if (data.feeds && data.feeds.length > 0) {
                    currentT = parseFloat(data.feeds[0].field1);
                    currentH = parseFloat(data.feeds[0].field2);
                    
                    // ESP32 没有真实风力和气压，显示提示或隐藏
                    document.getElementById('wind').innerText = "室内无风";
                    document.getElementById('pressure').innerText = "设备未接入";
                    
                    renderUI(currentT, currentH);
                }
            }).catch(err => console.log('ESP32 数据拉取失败', err));
        }

        // 数据源 2：拉取各大城市的公网真实气象数据 (Open-Meteo 免费接口)
        function fetchRealCityData(lat, lon) {
            // 请求真实的温度、湿度、地表气压和10米高空风速
            const url = `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current=temperature_2m,relative_humidity_2m,surface_pressure,wind_speed_10m&timezone=Asia%2FShanghai`;
            
            fetch(url).then(res => res.json()).then(data => {
                if(data.current) {
                    currentT = data.current.temperature_2m;
                    currentH = data.current.relative_humidity_2m;
                    
                    // 填入真实的公网气象数据！
                    let realWindSpeed = data.current.wind_speed_10m; // 单位 km/h
                    let realPressure = data.current.surface_pressure; // 单位 hPa
                    
                    // 将 km/h 粗略转换为风力等级 (蒲福风级)
                    let windLevel = realWindSpeed < 5 ? 1 : (realWindSpeed < 11 ? 2 : (realWindSpeed < 19 ? 3 : 4));
                    
                    document.getElementById('wind').innerText = windLevel + ' 级 (真实)';
                    document.getElementById('pressure').innerText = realPressure.toFixed(1) + ' hPa (真实)';
                    
                    renderUI(currentT, currentH);
                }
            }).catch(err => console.log('城市数据拉取失败', err));
        }

        // 通用 UI 渲染逻辑 (不管是哪来的数据，都用这套逻辑处理展示)
        function renderUI(t, h) {
            if (t > sessionMaxT) sessionMaxT = t;
            if (t < sessionMinT) sessionMinT = t;

            document.getElementById('temp').innerText = t;
            document.getElementById('hum').innerText = h + '%';
            document.getElementById('max-t').innerText = sessionMaxT + '°';
            document.getElementById('min-t').innerText = sessionMinT + '°';
            
            let feelsLike = t > 25 ? t + (h - 40) * 0.05 : (t < 15 ? t - (h * 0.02) : t);
            document.getElementById('feels-like').innerText = feelsLike.toFixed(1);

            let yi = "专注学习、室内阅读", ji = "长时间熬夜", uvStr = "较弱", descStr = '😊 气候适宜', bgStr = 'linear-gradient(135deg, #89f7fe 0%, #66a6ff 100%)';
            if (t >= 30) { yi = "开空调、多喝水"; ji = "户外暴晒"; uvStr = "极强"; descStr = '🥵 酷热难耐'; bgStr = 'linear-gradient(135deg, #ff0844 0%, #ffb199 100%)'; } 
            else if (t <= 15) { yi = "泡脚、添衣保暖"; ji = "吃冷饮"; uvStr = "很弱"; descStr = '🥶 寒气袭人'; bgStr = 'linear-gradient(135deg, #e0c3fc 0%, #8ec5fc 100%)'; }
            if (h >= 75) { ji += "、晾晒衣物"; if (t > 25) descStr = '💦 闷热潮湿'; }
            
            document.getElementById('yi-text').innerText = yi; document.getElementById('ji-text').innerText = ji;
            document.getElementById('desc').innerText = descStr; document.getElementById('uv').innerText = uvStr;
            document.getElementById('bg').style.background = bgStr;
        }

        // 初始化：默认先拉取 ESP32 的数据
        switchLocation();

        // 弹窗与 3D 翻转保留原有逻辑
        function checkClothes() {
            let title = "👕 材质穿搭建议";
            let text = currentT < 15 ? "当前环境阴冷。<br><br>外出建议直接选择保暖性极佳的<strong>“特厚羊毛内胆”</strong>款式以强效御寒。" : "当前环境适中。<br><br>推荐穿着<strong>“加厚莫代尔 + 真丝内胆”</strong>的款式，其肤感更优且不易产生闷汗感。";
            openModal(title, text);
        }
        function checkHomestead() {
            let title = "🏠 建筑防潮评估雷达";
            let text = currentH > 75 ? `⚠️ 湿度高达 <strong>${currentH}%</strong>。<br><br>若此为老屋或闲置宅基地，请择日安排开窗通风，翻修时重点关注防潮工程。` : `✅ 湿度 <strong>${currentH}%</strong>，处于安全范围。<br><br>适合在庭院开展晾晒作业，或进行老屋的修缮施工。`;
            openModal(title, text);
        }
        function openModal(title, text) { document.getElementById('modal-title').innerText = title; document.getElementById('modal-text').innerHTML = text; document.getElementById('myModal').style.display = 'flex'; }
        function closeModal() { document.getElementById('myModal').style.display = 'none'; }
        
        function flipToGold() { document.getElementById('flip-box').classList.add('flipped'); }
        function flipToWeather() { document.getElementById('flip-box').classList.remove('flipped'); }
        setInterval(() => {
            let fluctuation = (Math.random() * 2 - 1).toFixed(2);
            document.getElementById('gold-price').innerText = (485.00 + parseFloat(fluctuation)).toFixed(2);
        }, 3000);
    </script>
</body>
</html>
