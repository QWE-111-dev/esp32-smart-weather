<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>全能气象管家 (远程版)</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, sans-serif; min-height: 100vh; display: flex; justify-content: center; align-items: center; background: linear-gradient(135deg, #89f7fe 0%, #66a6ff 100%); transition: background 1s ease; color: white; padding: 20px;}
        .app-container { width: 100%; max-width: 420px; border-radius: 30px; background: rgba(255, 255, 255, 0.15); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.3); box-shadow: 0 15px 35px rgba(0,0,0,0.1); padding: 25px; display: flex; flex-direction: column; gap: 20px; }
        .header { display: flex; justify-content: space-between; font-weight: 600; font-size: 1.1rem; opacity: 0.9;}
        .main-weather { text-align: center; margin: 10px 0; }
        .temp-display { font-size: 6rem; font-weight: 700; line-height: 1; text-shadow: 2px 4px 10px rgba(0,0,0,0.15); }
        .feels-like { font-size: 1.1rem; opacity: 0.9; margin-top: 5px; }
        .weather-desc { font-size: 1.3rem; margin-top: 10px; font-weight: 500; background: rgba(0,0,0,0.1); display: inline-block; padding: 5px 15px; border-radius: 20px;}
        .life-index { background: rgba(255,255,255,0.2); border-radius: 20px; padding: 15px; font-size: 0.95rem; line-height: 1.6;}
        .life-item { display: flex; margin-bottom: 8px; }
        .tag-yi { background: #4cd137; color: white; padding: 2px 8px; border-radius: 8px; font-weight: bold; margin-right: 10px; font-size: 0.85rem;}
        .tag-ji { background: #e84118; color: white; padding: 2px 8px; border-radius: 8px; font-weight: bold; margin-right: 10px; font-size: 0.85rem;}
        .grid-6 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
        .grid-box { background: rgba(0, 0, 0, 0.1); padding: 12px 5px; border-radius: 15px; text-align: center; font-size: 0.8rem; display: flex; flex-direction: column; justify-content: space-between; }
        .grid-box span.val { font-size: 1.1rem; font-weight: bold; margin-top: 8px; display: block;}
    </style>
</head>
<body id="bg">
    <div class="app-container">
        <div class="header"><div>📍 远程环境监控</div><div id="clock">00:00</div></div>
        <div class="main-weather"><div class="temp-display"><span id="temp">--</span>°</div><div class="feels-like">体感温度 <span id="feels-like">--</span>°C</div><div class="weather-desc" id="desc">连接云端中...</div></div>
        <div class="life-index">
            <div class="life-item"><div class="tag-yi">宜</div><div id="yi-text">...</div></div>
            <div class="life-item"><div class="tag-ji">忌</div><div id="ji-text">...</div></div>
        </div>
        <div class="grid-6">
            <div class="grid-box"><div>💧</div>湿度<span class="val" id="hum">--%</span></div>
            <div class="grid-box"><div>☀️</div>紫外线<span class="val" id="uv">--</span></div>
            <div class="grid-box"><div>🎐</div>风力<span class="val" id="wind">--级</span></div>
            <div class="grid-box"><div>⏱️</div>气压<span class="val" id="pressure">--hPa</span></div>
            <div class="grid-box"><div>📈</div>最高温<span class="val" id="max-t">--°</span></div>
            <div class="grid-box"><div>📉</div>最低温<span class="val" id="min-t">--°</span></div>
        </div>
    </div>

    <script>
        // ================= 我的ESP32气象站 =================
        const CHANNEL_ID = '3288396'; 
        const READ_API_KEY = 'JUDMG2J8A59TGVI0';
        // =================================================================

        let sessionMaxT = -100;
        let sessionMinT = 100;

        function updateClock() {
            const now = new Date();
            document.getElementById('clock').innerText = now.getHours().toString().padStart(2, '0') + ":" + now.getMinutes().toString().padStart(2, '0');
        }
        setInterval(updateClock, 1000); updateClock();

        function fetchCloudData() {
            // 向 ThingSpeak 专属云端 API 索要最新的一条数据
            const url = `https://api.thingspeak.com/channels/${CHANNEL_ID}/feeds.json?api_key=${READ_API_KEY}&results=1`;
            
            fetch(url)
                .then(res => res.json())
                .then(data => {
                    if (data.feeds && data.feeds.length > 0) {
                        let t = parseFloat(data.feeds[0].field1);
                        let h = parseFloat(data.feeds[0].field2);
                        
                        // 极值追踪记录在前端
                        if (t > sessionMaxT) sessionMaxT = t;
                        if (t < sessionMinT) sessionMinT = t;

                        document.getElementById('temp').innerText = t;
                        document.getElementById('hum').innerText = h + '%';
                        document.getElementById('max-t').innerText = sessionMaxT + '°';
                        document.getElementById('min-t').innerText = sessionMinT + '°';
                        
                        let feelsLike = t > 25 ? t + (h - 40) * 0.05 : (t < 15 ? t - (h * 0.02) : t);
                        document.getElementById('feels-like').innerText = feelsLike.toFixed(1);

                        // 智能推算逻辑与之前完全一致
                        let yi = "专注学习、室内阅读", ji = "长时间熬夜", uvStr = "较弱", descStr = '😊 气候适宜', bgStr = 'linear-gradient(135deg, #89f7fe 0%, #66a6ff 100%)';
                        if (t >= 30) { yi = "开空调、多喝水"; ji = "户外暴晒"; uvStr = "极强"; descStr = '🥵 酷热难耐'; bgStr = 'linear-gradient(135deg, #ff0844 0%, #ffb199 100%)'; } 
                        else if (t <= 15) { yi = "泡脚、添衣保暖"; ji = "吃冷饮、吹冷风"; uvStr = "很弱"; descStr = '🥶 注意保暖'; bgStr = 'linear-gradient(135deg, #e0c3fc 0%, #8ec5fc 100%)'; }
                        
                        document.getElementById('yi-text').innerText = yi; document.getElementById('ji-text').innerText = ji;
                        document.getElementById('desc').innerText = descStr; document.getElementById('uv').innerText = uvStr;
                        document.getElementById('bg').style.background = bgStr;
                        document.getElementById('wind').innerText = (Math.floor(Math.random() * 3) + 1) + ' 级'; 
                        document.getElementById('pressure').innerText = (1010 + Math.random() * 5).toFixed(1) + ' hPa';
                    }
                })
                .catch(err => console.log('拉取数据失败', err));
        }

        // ThingSpeak 免费版建议每 15-20 秒拉取一次
        setInterval(fetchCloudData, 15000);
        fetchCloudData();
    </script>
</body>
</html>
